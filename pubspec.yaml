name: beafrica
description: "Découvrez le cœur de l'Afrique - Application officielle BéAfrica"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # === STATE MANAGEMENT ===
  flutter_riverpod: ^2.4.9

  # === NAVIGATION ===
  go_router: ^13.2.0

  # === FIREBASE ===
  firebase_core: ^2.27.1
  firebase_auth: ^4.17.9
  cloud_firestore: ^4.15.9
  firebase_storage: ^11.6.10
  firebase_messaging: ^14.7.20

  # === HTTP & APIs ===
  dio: ^5.4.1
  dart_rss: ^3.0.2

  # === BASE DE DONNÉES LOCALE ===
  sqflite: ^2.3.2
  sqflite_common_ffi: ^2.3.2
  path: ^1.8.3

  # === UI & DESIGN ===
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1

  # === RÉSEAU ===
  connectivity_plus: ^5.0.2

  # === UTILITAIRES ===
  intl: ^0.19.0
  url_launcher: ^6.2.6
  share_plus: ^7.2.2
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.2
  image_picker: ^1.0.7
  uuid: ^4.3.3

  # === MAPS (v2) ===
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # === AUDIO ===
  just_audio: ^0.9.36

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo/beafrica_icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#F8F6F2"
  adaptive_icon_foreground: "assets/images/logo/beafrica_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/logo/
    - assets/images/onboarding/
    - assets/images/placeholders/
    - assets/images/about/
    - assets/icons/meteo/
    - assets/data/
    - .env
